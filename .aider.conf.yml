# Aider Configuration File
# General settings for AI pair programming

# Model Configuration
model-settings-file: ./aider.model.settings.yml
weak-model: openrouter/qwen/qwen3-coder:free
editor-model: openrouter/qwen/qwen3-coder:free
edit-format: whole

# Git Integration
auto-commits: false
dirty-commits: true
attribute-co-authored-by: false
show-diffs: true
gitignore: true

# Development Workflow
auto-lint: true
auto-test: true
lint-cmd:
  - "python: ruff check --fix"
  - "python: black ."

# Performance & Caching
cache-prompts: true
map-tokens: 2048
map-refresh: auto

# User Experience
stream: true
pretty: true
dark-mode: true
fancy-input: true
show-model-warnings: false

# History & Logging
restore-chat-history: true
llm-history-file: .aider.llm.history
input-history-file: .aider.input.history
chat-history-file: .aider.chat.history.md

# Privacy & Analytics
analytics: false

# File Management
encoding: utf-8
line-endings: platform

# Security
verify-ssl: true
timeout: 120

# Voice (disabled by default)
# voice-format: wav
# voice-language: auto
